<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>凉了么</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --black: #0a0a0a;
            --dark: #1a1a1a;
            --gray-1: #2a2a2a;
            --gray-2: #3a3a3a;
            --gray-3: #666;
            --gray-4: #999;
            --gray-5: #ccc;
            --white: #f0f0f0;
            --red: #ff3b30;
            --red-glow: rgba(255, 59, 48, 0.3);
            --green: #34c759;
            --green-glow: rgba(52, 199, 89, 0.3);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== 全局噪声纹理 ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 页面容器 ===== */
        .app-container {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .page {
            display: none;
            min-height: 100vh;
            padding: 0 24px;
            padding-bottom: 100px;
            animation: pageIn 0.4s ease;
        }
        .page.active { display: block; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 顶部标题栏 ===== */
        .header {
            padding: 60px 0 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gray-4);
        }
        .header h1 span {
            color: var(--red);
            font-weight: 700;
        }

        /* ===== 首页 ===== */
        .alive-status {
            text-align: center;
            padding: 40px 0;
        }
        .alive-status .status-text {
            font-size: 18px;
            font-weight: 300;
            color: var(--gray-4);
            margin-bottom: 8px;
        }
        .alive-status .status-time {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 8px;
            transition: color 0.3s;
        }
        .alive-status .status-time.warning { color: var(--red); }
        .alive-status .status-time.normal { color: var(--white); }
        .alive-status .status-sub {
            font-size: 13px;
            color: var(--gray-4);
        }

        /* 续命按钮 */
        .alive-btn-container {
            display: flex;
            justify-content: center;
            padding: 30px 0;
        }
        .alive-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px solid var(--gray-2);
            background: var(--dark);
            color: var(--white);
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .alive-btn:active {
            transform: scale(0.95);
            border-color: var(--green);
            box-shadow: 0 0 40px var(--green-glow);
        }
        .alive-btn.checked {
            border-color: var(--green);
            box-shadow: 0 0 30px var(--green-glow);
        }
        .alive-btn.checked::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid var(--green);
            opacity: 0.3;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.1; }
        }
        .alive-btn .btn-sub {
            font-size: 12px;
            font-weight: 300;
            color: var(--gray-4);
        }
        .alive-btn .btn-icon {
            font-size: 40px;
            margin-bottom: 4px;
        }

        /* 续命成功动画 */
        .success-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
            animation: fadeIn 0.3s ease;
        }
        .success-overlay.show { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .success-overlay .check-icon {
            font-size: 80px;
            animation: bounceIn 0.5s ease;
        }
        @keyframes bounceIn {
            0% { transform: scale(0); }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .success-overlay .success-text {
            font-size: 22px;
            font-weight: 700;
            color: var(--green);
        }
        .success-overlay .success-sub {
            font-size: 14px;
            color: var(--gray-4);
        }

        /* 统计条 */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px 0;
            margin-top: 10px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-item .stat-num {
            font-size: 28px;
            font-weight: 900;
            color: var(--white);
        }
        .stat-item .stat-label {
            font-size: 11px;
            color: var(--gray-4);
            letter-spacing: 2px;
            margin-top: 4px;
        }

        /* ===== 今日小续命 ===== */
        .mission-card {
            background: var(--dark);
            border: 1px solid var(--gray-1);
            border-radius: 16px;
            padding: 24px;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
        }
        .mission-card::before {
            content: '今日小续命';
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 10px;
            color: var(--gray-3);
            letter-spacing: 2px;
        }
        .mission-label {
            font-size: 12px;
            color: var(--gray-4);
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .mission-text {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 16px;
        }
        .mission-btn {
            background: none;
            border: 1px solid var(--gray-2);
            color: var(--gray-4);
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .mission-btn:active, .mission-btn.done {
            border-color: var(--green);
            color: var(--green);
        }
        .mission-btn.done {
            pointer-events: none;
        }

        /* ===== 提醒页 ===== */
        .remind-header {
            padding: 60px 0 30px;
        }
        .remind-header h2 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .remind-header p {
            font-size: 13px;
            color: var(--gray-4);
        }

        .remind-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .remind-item {
            background: var(--dark);
            border: 1px solid var(--gray-1);
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }
        .remind-item .remind-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }
        .remind-item .remind-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gray-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .remind-item .remind-info h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 3px;
        }
        .remind-item .remind-info p {
            font-size: 12px;
            color: var(--gray-4);
        }
        .remind-item .remind-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 开关按钮 */
        .toggle {
            width: 48px;
            height: 28px;
            border-radius: 14px;
            background: var(--gray-2);
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }
        .toggle.on { background: var(--green); }
        .toggle::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--white);
            top: 3px;
            left: 3px;
            transition: all 0.3s;
        }
        .toggle.on::after { left: 23px; }

        .delete-btn {
            background: none;
            border: none;
            color: var(--gray-3);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        /* 添加提醒按钮 */
        .add-remind-btn {
            width: 100%;
            padding: 18px;
            border: 1px dashed var(--gray-2);
            border-radius: 14px;
            background: transparent;
            color: var(--gray-3);
            font-size: 14px;
            cursor: pointer;
            margin-top: 16px;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.3s;
        }
        .add-remind-btn:active {
            border-color: var(--white);
            color: var(--white);
        }

        /* ===== 设置页 ===== */
        .settings-header {
            padding: 60px 0 30px;
        }
        .settings-header h2 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .settings-header p {
            font-size: 13px;
            color: var(--gray-4);
        }

        .settings-section {
            margin-bottom: 30px;
        }
        .settings-section .section-label {
            font-size: 11px;
            color: var(--gray-3);
            letter-spacing: 3px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .settings-card {
            background: var(--dark);
            border: 1px solid var(--gray-1);
            border-radius: 14px;
            overflow: hidden;
        }
        .settings-item {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gray-1);
        }
        .settings-item:last-child { border-bottom: none; }
        .settings-item .item-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .settings-item .item-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--gray-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .settings-item .item-info h4 {
            font-size: 14px;
            font-weight: 700;
        }
        .settings-item .item-info p {
            font-size: 11px;
            color: var(--gray-4);
            margin-top: 2px;
        }
        .settings-item .item-value {
            font-size: 13px;
            color: var(--gray-3);
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .contact-item {
            background: var(--gray-1);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .contact-item .contact-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .contact-item .contact-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gray-2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--gray-4);
        }
        .contact-item .contact-name {
            font-size: 14px;
            font-weight: 700;
        }
        .contact-item .contact-phone {
            font-size: 12px;
            color: var(--gray-4);
        }

        .add-contact-btn {
            width: 100%;
            padding: 16px;
            border: 1px dashed var(--gray-2);
            border-radius: 10px;
            background: transparent;
            color: var(--gray-3);
            font-size: 13px;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.3s;
        }
        .add-contact-btn:active {
            border-color: var(--white);
            color: var(--white);
        }

        /* ===== 底部导航 ===== */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: var(--black);
            border-top: 1px solid var(--gray-1);
            display: flex;
            padding: 10px 0;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            z-index: 50;
        }
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 0;
            transition: all 0.3s;
        }
        .tab-item .tab-icon {
            font-size: 22px;
            transition: all 0.3s;
        }
        .tab-item .tab-label {
            font-size: 10px;
            color: var(--gray-3);
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .tab-item.active .tab-icon { transform: scale(1.1); }
        .tab-item.active .tab-label { color: var(--white); }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: flex-end;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            width: 100%;
            max-width: 430px;
            background: var(--dark);
            border-radius: 20px 20px 0 0;
            padding: 30px 24px;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .modal .form-group {
            margin-bottom: 16px;
        }
        .modal label {
            display: block;
            font-size: 12px;
            color: var(--gray-4);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .modal input, .modal select {
            width: 100%;
            padding: 14px 16px;
            background: var(--gray-1);
            border: 1px solid var(--gray-2);
            border-radius: 10px;
            color: var(--white);
            font-size: 15px;
            font-family: 'Noto Sans SC', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }
        .modal input:focus, .modal select:focus {
            border-color: var(--white);
        }
        .modal input::placeholder { color: var(--gray-3); }
        .modal .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .modal .btn-cancel {
            flex: 1;
            padding: 14px;
            background: var(--gray-1);
            border: none;
            border-radius: 10px;
            color: var(--gray-4);
            font-size: 14px;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .modal .btn-confirm {
            flex: 1;
            padding: 14px;
            background: var(--white);
            border: none;
            border-radius: 10px;
            color: var(--black);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--dark);
            border: 1px solid var(--gray-1);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 13px;
            z-index: 300;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ===== 警告横幅 ===== */
        .warning-banner {
            display: none;
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s;
        }
        .warning-banner.show { display: flex; align-items: center; gap: 10px; }
        .warning-banner .warn-icon { font-size: 18px; }
        .warning-banner .warn-text { font-size: 13px; color: var(--red); }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: var(--gray-3);
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- ===== 首页 ===== -->
    <div class="page active" id="page-home">
        <div class="header">
            <h1><span>凉</span>了么</h1>
        </div>

        <div class="warning-banner" id="warningBanner">
            <span class="warn-icon">⚠️</span>
            <span class="warn-text">再不来签到就真凉了</span>
        </div>

        <div class="alive-status">
            <div class="status-text">距离下次签到</div>
            <div class="status-time normal" id="countdown">--:--:--</div>
            <div class="status-sub" id="statusSub">点击下方按钮证明你还活着</div>
        </div>

        <div class="alive-btn-container">
            <button class="alive-btn" id="aliveBtn" onclick="checkAlive()">
                <span class="btn-icon">💀</span>
                <span>还活着</span>
                <span class="btn-sub">点我续命</span>
            </button>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-num" id="totalDays">0</div>
                <div class="stat-label">累计续命</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="streakDays">0</div>
                <div class="stat-label">连续续命</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="missionDays">0</div>
                <div class="stat-label">小续命</div>
            </div>
        </div>

        <div class="mission-card" id="missionCard">
            <div class="mission-label">每日任务</div>
            <div class="mission-text" id="missionText">加载中...</div>
            <button class="mission-btn" id="missionBtn" onclick="completeMission()">完成了 ✔️</button>
        </div>
    </div>

    <!-- ===== 提醒页 ===== -->
    <div class="page" id="page-remind">
        <div class="remind-header">
            <h2>独居提醒</h2>
            <p>怕忘了就设个提醒，活着的第一步是记得</p>
        </div>

        <div class="remind-list" id="remindList">
            <!-- 提醒项会动态插入 -->
        </div>

        <button class="add-remind-btn" onclick="openAddRemind()">+ 添加提醒</button>
    </div>

    <!-- ===== 设置页 ===== -->
    <div class="page" id="page-settings">
        <div class="settings-header">
            <h2>设置</h2>
            <p>真凉了的话，至少有人知道</p>
        </div>

        <div class="settings-section">
            <div class="section-label">紧急联系人</div>
            <div class="contact-list" id="contactList"></div>
            <button class="add-contact-btn" onclick="openAddContact()" style="margin-top:12px;">+ 添加联系人</button>
        </div>

        <div class="settings-section">
            <div class="section-label">续命设置</div>
            <div class="settings-card">
                <div class="settings-item">
                    <div class="item-left">
                        <div class="item-icon">⏰</div>
                        <div class="item-info">
                            <h4>签到周期</h4>
                            <p id="cycleText">每24小时签到一次</p>
                        </div>
                    </div>
                    <select id="cycleSelect" onchange="updateCycle()" style="background:var(--gray-1);border:1px solid var(--gray-2);border-radius:8px;color:var(--white);padding:6px 10px;font-size:12px;font-family:'Noto Sans SC',sans-serif;">
                        <option value="12">12小时</option>
                        <option value="24" selected>24小时</option>
                        <option value="48">48小时</option>
                    </select>
                </div>
                <div class="settings-item">
                    <div class="item-left">
                        <div class="item-icon">📱</div>
                        <div class="item-info">
                            <h4>超时短信通知</h4>
                            <p>自动发短信给紧急联系人</p>
                        </div>
                    </div>
                    <div class="toggle on" id="smsToggle" onclick="toggleSMS()"></div>
                </div>
                <div class="settings-item">
                    <div class="item-left">
                        <div class="item-icon">🔔</div>
                        <div class="item-info">
                            <h4>签到提醒</h4>
                            <p>到期前1小时提醒</p>
                        </div>
                    </div>
                    <div class="toggle on" id="notifyToggle" onclick="toggleNotify()"></div>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <div class="section-label">关于</div>
            <div class="settings-card">
                <div class="settings-item">
                    <div class="item-left">
                        <div class="item-icon">🪦</div>
                        <div class="item-info">
                            <h4>凉了么</h4>
                            <p>v1.0.0 — 独居人士生存工具</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 底部导航 ===== -->
    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('home')">
            <span class="tab-icon">💀</span>
            <span class="tab-label">续命</span>
        </div>
        <div class="tab-item" onclick="switchTab('remind')">
            <span class="tab-icon">🔔</span>
            <span class="tab-label">提醒</span>
        </div>
        <div class="tab-item" onclick="switchTab('settings')">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label">设置</span>
        </div>
    </div>
</div>

<!-- ===== 续命成功弹窗 ===== -->
<div class="success-overlay" id="successOverlay" onclick="closeSuccess()">
    <div class="check-icon">✅</div>
    <div class="success-text">续命成功</div>
    <div class="success-sub" id="successSub">明天见，好好活着</div>
</div>

<!-- ===== 添加提醒弹窗 ===== -->
<div class="modal-overlay" id="remindModal">
    <div class="modal">
        <h3>添加提醒</h3>
        <div class="form-group">
            <label>提醒类型</label>
            <select id="remindType">
                <option value="🔥">关煤气</option>
                <option value="💧">关水</option>
                <option value="💊">吃药</option>
                <option value="😴">睡觉</option>
                <option value="🥤">喝水</option>
                <option value="🌿">浇花</option>
                <option value="📢">自定义</option>
            </select>
        </div>
        <div class="form-group">
            <label>提醒时间</label>
            <input type="time" id="remindTime" value="22:00">
        </div>
        <div class="form-group">
            <label>自定义内容（可选）</label>
            <input type="text" id="remindCustom" placeholder="比如：喂猫">
        </div>
        <div class="btn-row">
            <button class="btn-cancel" onclick="closeRemindModal()">取消</button>
            <button class="btn-confirm" onclick="saveRemind()">添加</button>
        </div>
    </div>
</div>

<!-- ===== 添加联系人弹窗 ===== -->
<div class="modal-overlay" id="contactModal">
    <div class="modal">
        <h3>添加紧急联系人</h3>
        <div class="form-group">
            <label>姓名</label>
            <input type="text" id="contactName" placeholder="比如：老妈">
        </div>
        <div class="form-group">
            <label>手机号</label>
            <input type="tel" id="contactPhone" placeholder="比如：13800138000" maxlength="11">
        </div>
        <div class="btn-row">
            <button class="btn-cancel" onclick="closeContactModal()">取消</button>
            <button class="btn-confirm" onclick="saveContact()">添加</button>
        </div>
    </div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<script>
    // ===== 数据存储 =====
    const DB = {
        get(key, def) {
            try { return JSON.parse(localStorage.getItem('liangl_' + key)) || def; }
            catch { return def; }
        },
        set(key, val) {
            localStorage.setItem('liangl_' + key, JSON.stringify(val));
        }
    };

    // ===== 状态 =====
    let state = {
        lastCheckin: DB.get('lastCheckin', null),
        totalDays: DB.get('totalDays', 0),
        streakDays: DB.get('streakDays', 0),
        missionDays: DB.get('missionDays', 0),
        todayMission: DB.get('todayMission', null),
        todayMissionDone: DB.get('todayMissionDone', false),
        reminds: DB.get('reminds', []),
        contacts: DB.get('contacts', []),
        cycle: DB.get('cycle', 24),
        smsEnabled: DB.get('smsEnabled', true),
        notifyEnabled: DB.get('notifyEnabled', true),
    };

    // ===== 每日任务库 =====
    const missions = [
        '喝一杯温水 🥤', '晒10分钟太阳 ☀️', '给植物浇浇水 🌿',
        '听一首喜欢的歌 🎵', '深呼吸5次 🌬️', '伸个懒腰 🙆',
        '看看窗外3分钟 🪟', '吃一个水果 🍎', '给朋友发条消息 💬',
        '洗个热水澡 🚿', '整理一下桌面 🧹', '写3件开心的事 ✍️',
        '拍一张照片 📷', '下楼走5分钟 🚶', '给自己倒杯水 💧',
        '闭眼休息2分钟 😌', '读一页书 📖', '吃颗糖 🍬',
        '摸摸猫猫狗狗 🐱', '发条朋友圈记录今天 📱',
        '给自己做顿饭 🍳', '敷个面膜 💆', '刷刷牙 🪥',
        '跟家人打个电话 📞', '整理一下房间 🏠',
    ];

    const successMsgs = [
        '续命成功，明天见', '今天也好好活着呢', '活着真好，不是吗',
        '又活了一天，了不起', '续命+1，继续保持', '恭喜你，今天没凉',
        '你还活着，这很好', '今天的你也很努力',
    ];

    // ===== 页面切换 =====
    function switchTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('page-' + tab).classList.add('active');
        document.querySelectorAll('.tab-item')[['home','remind','settings'].indexOf(tab)].classList.add('active');

        if (tab === 'remind') renderReminds();
        if (tab === 'settings') renderContacts();
    }

    // ===== 签到逻辑 =====
    function checkAlive() {
        const now = Date.now();
        const last = state.lastCheckin;
        const cycleMs = state.cycle * 60 * 60 * 1000;

        if (last && (now - last) < cycleMs) {
            showToast('已经续过命了，明天再来');
            return;
        }

        // 更新数据
        state.lastCheckin = now;
        state.totalDays++;

        // 连续续命计算
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const lastDate = last ? new Date(last) : null;
        if (lastDate) {
            const lastDay = new Date(lastDate.getFullYear(), lastDate.getMonth(), lastDate.getDate());
            const yestDay = new Date(yesterday.getFullYear(), yesterday.getMonth(), yesterday.getDate());
            if (lastDay.getTime() === yestDay.getTime()) {
                state.streakDays++;
            } else if (lastDay.getTime() < yestDay.getTime()) {
                state.streakDays = 1;
            }
        } else {
            state.streakDays = 1;
        }

        DB.set('lastCheckin', state.lastCheckin);
        DB.set('totalDays', state.totalDays);
        DB.set('streakDays', state.streakDays);

        // 显示成功动画
        const msg = successMsgs[Math.floor(Math.random() * successMsgs.length)];
        document.getElementById('successSub').textContent = msg;
        document.getElementById('successOverlay').classList.add('show');
        document.getElementById('aliveBtn').classList.add('checked');

        // 检查是否超时需要发短信
        checkTimeoutSMS();

        updateStats();
        updateCountdown();
    }

    function closeSuccess() {
        document.getElementById('successOverlay').classList.remove('show');
    }

    // ===== 倒计时 =====
    function updateCountdown() {
        const now = Date.now();
        const last = state.lastCheckin;
        const cycleMs = state.cycle * 60 * 60 * 1000;
        const el = document.getElementById('countdown');
        const sub = document.getElementById('statusSub');
        const btn = document.getElementById('aliveBtn');
        const banner = document.getElementById('warningBanner');

        if (!last) {
            el.textContent = '--:--:--';
            el.className = 'status-time normal';
            sub.textContent = '点击下方按钮证明你还活着';
            btn.classList.remove('checked');
            banner.classList.remove('show');
            return;
        }

        const remaining = cycleMs - (now - last);

        if (remaining <= 0) {
            el.textContent = '已超时';
            el.className = 'status-time warning';
            sub.textContent = '快签到，不然就真凉了';
            btn.classList.remove('checked');
            banner.classList.add('show');
            return;
        }

        const hours = Math.floor(remaining / 3600000);
        const mins = Math.floor((remaining % 3600000) / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        el.textContent = `${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

        if (remaining < 3600000) {
            el.className = 'status-time warning';
            sub.textContent = '快凉了，速来签到';
            banner.classList.add('show');
        } else {
            el.className = 'status-time normal';
            sub.textContent = '一切正常，暂时没凉';
            banner.classList.remove('show');
            btn.classList.add('checked');
        }
    }

    // ===== 统计 =====
    function updateStats() {
        document.getElementById('totalDays').textContent = state.totalDays;
        document.getElementById('streakDays').textContent = state.streakDays;
        document.getElementById('missionDays').textContent = state.missionDays;
    }

    // ===== 今日小续命 =====
    function updateMission() {
        const today = new Date().toDateString();

        if (state.todayMission && state.todayMission.date === today) {
            document.getElementById('missionText').textContent = state.todayMission.text;
            if (state.todayMissionDone) {
                const btn = document.getElementById('missionBtn');
                btn.textContent = '已完成 ✅';
                btn.classList.add('done');
            }
            return;
        }

        // 每天随机选一个任务
        const mission = missions[Math.floor(Math.random() * missions.length)];
        state.todayMission = { date: today, text: mission };
        state.todayMissionDone = false;
        DB.set('todayMission', state.todayMission);
        DB.set('todayMissionDone', false);

        document.getElementById('missionText').textContent = mission;
        const btn = document.getElementById('missionBtn');
        btn.textContent = '完成了 ✔️';
        btn.classList.remove('done');
    }

    function completeMission() {
        if (state.todayMissionDone) return;
        state.todayMissionDone = true;
        state.missionDays++;
        DB.set('todayMissionDone', true);
        DB.set('missionDays', state.missionDays);

        const btn = document.getElementById('missionBtn');
        btn.textContent = '已完成 ✅';
        btn.classList.add('done');
        updateStats();
        showToast('小续命成功 +1');
    }

    // ===== 超时短信检查 =====
    function checkTimeoutSMS() {
        // 实际项目中这里调用短信API
        // 模拟逻辑：超时后通知紧急联系人
        if (!state.smsEnabled || state.contacts.length === 0) return;

        const now = Date.now();
        const last = state.lastCheckin;
        const cycleMs = state.cycle * 60 * 60 * 1000;

        // 注意：这里检查的是上一次签到，不是当前这次
        // 实际使用中，需要后端定时任务检查
    }

    // ===== 提醒管理 =====
    function renderReminds() {
        const list = document.getElementById('remindList');
        const reminds = state.reminds;

        if (reminds.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无提醒<br>添加一个，让自己更安心</p></div>';
            return;
        }

        list.innerHTML = reminds.map((r, i) => `
            <div class="remind-item">
                <div class="remind-left">
                    <div class="remind-icon">${r.icon}</div>
                    <div class="remind-info">
                        <h3>${r.name}</h3>
                        <p>每天 ${r.time}</p>
                    </div>
                </div>
                <div class="remind-right">
                    <div class="toggle ${r.enabled ? 'on' : ''}" onclick="toggleRemind(${i})"></div>
                    <button class="delete-btn" onclick="deleteRemind(${i})">✕</button>
                </div>
            </div>
        `).join('');
    }

    function openAddRemind() {
        document.getElementById('remindModal').classList.add('show');
    }
    function closeRemindModal() {
        document.getElementById('remindModal').classList.remove('show');
        document.getElementById('remindCustom').value = '';
    }
    function saveRemind() {
        const type = document.getElementById('remindType');
        const icon = type.options[type.selectedIndex].text === '自定义' ? '📢' : type.value;
        const name = type.options[type.selectedIndex].text === '自定义'
            ? (document.getElementById('remindCustom').value || '自定义提醒')
            : type.options[type.selectedIndex].text;
        const time = document.getElementById('remindTime').value;

        if (!name.trim()) { showToast('请填写提醒内容'); return; }
        if (!time) { showToast('请选择时间'); return; }

        state.reminds.push({ icon, name, time, enabled: true });
        DB.set('reminds', state.reminds);
        closeRemindModal();
        renderReminds();
        showToast('提醒已添加');
    }
    function toggleRemind(i) {
        state.reminds[i].enabled = !state.reminds[i].enabled;
        DB.set('reminds', state.reminds);
        renderReminds();
    }
    function deleteRemind(i) {
        state.reminds.splice(i, 1);
        DB.set('reminds', state.reminds);
        renderReminds();
        showToast('提醒已删除');
    }

    // ===== 联系人管理 =====
    function renderContacts() {
        const list = document.getElementById('contactList');
        const contacts = state.contacts;

        if (contacts.length === 0) {
            list.innerHTML = '<div class="empty-state" style="padding:30px 0;"><p>暂无紧急联系人<br>添加一个，以防万一</p></div>';
            return;
        }

        list.innerHTML = contacts.map((c, i) => `
            <div class="contact-item">
                <div class="contact-info">
                    <div class="contact-avatar">${c.name[0]}</div>
                    <div>
                        <div class="contact-name">${c.name}</div>
                        <div class="contact-phone">${maskPhone(c.phone)}</div>
                    </div>
                </div>
                <button class="delete-btn" onclick="deleteContact(${i})">✕</button>
            </div>
        `).join('');
    }

    function maskPhone(p) {
        return p.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
    }

    function openAddContact() {
        document.getElementById('contactModal').classList.add('show');
    }
    function closeContactModal() {
        document.getElementById('contactModal').classList.remove('show');
        document.getElementById('contactName').value = '';
        document.getElementById('contactPhone').value = '';
    }
    function saveContact() {
        const name = document.getElementById('contactName').value.trim();
        const phone = document.getElementById('contactPhone').value.trim();

        if (!name) { showToast('请填写姓名'); return; }
        if (!/^1\d{10}$/.test(phone)) { showToast('请输入正确的手机号'); return; }

        state.contacts.push({ name, phone });
        DB.set('contacts', state.contacts);
        closeContactModal();
        renderContacts();
        showToast('联系人已添加');
    }
    function deleteContact(i) {
        state.contacts.splice(i, 1);
        DB.set('contacts', state.contacts);
        renderContacts();
        showToast('联系人已删除');
    }

    // ===== 设置 =====
    function updateCycle() {
        state.cycle = parseInt(document.getElementById('cycleSelect').value);
        DB.set('cycle', state.cycle);
        document.getElementById('cycleText').textContent = `每${state.cycle}小时签到一次`;
        updateCountdown();
    }
    function toggleSMS() {
        state.smsEnabled = !state.smsEnabled;
        document.getElementById('smsToggle').classList.toggle('on');
        DB.set('smsEnabled', state.smsEnabled);
    }
    function toggleNotify() {
        state.notifyEnabled = !state.notifyEnabled;
        document.getElementById('notifyToggle').classList.toggle('on');
        DB.set('notifyEnabled', state.notifyEnabled);
    }

    // ===== Toast =====
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ===== 初始化 =====
    function init() {
        updateCountdown();
        updateStats();
        updateMission();
        renderReminds();
        renderContacts();

        // 恢复设置
        document.getElementById('cycleSelect').value = state.cycle;
        document.getElementById('smsToggle').classList.toggle('on', state.smsEnabled);
        document.getElementById('notifyToggle').classList.toggle('on', state.notifyEnabled);

        // 每秒更新倒计时
        setInterval(updateCountdown, 1000);
    }

    init();
</script>
</body>
</html>
